services:
  # 1. The Node.js Backend
  - type: web
    name: pharmanear-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18.x
      - key: MONGO_URL
        sync: false # Requires manual entry of the database connection string in Render Dashboard
      - key: JWT_SECRET
        generateValue: true # Render automatically generates a secure string
      - key: CORS_ORIGIN
        value: "*" # Allow all origins initially

  # 2. The React/Vite Frontend
  - type: web
    name: pharmanear-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 18.x
      # You will need to manually set this in the Render dashboard after the backend deploys
      - key: VITE_BACKEND_URL
        sync: false
